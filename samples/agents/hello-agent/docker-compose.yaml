# Local testing — run the agent without a K8s cluster.
# Requires AWS credentials with bedrock:InvokeModel permission in us-east-1.
#
# Usage:
#   docker compose up --build
#   curl -X POST http://localhost:8080/chat \
#     -H "Content-Type: application/json" \
#     -d '{"message": "What time is it?"}'

services:
  hello-agent:
    build: .
    ports:
      - "8080:8080"
    environment:
      - AWS_REGION=us-east-1
      - MODEL_ID=anthropic.claude-3-haiku-20240307-v1:0
      - MAX_TOKENS=1024
      - LOG_LEVEL=DEBUG
      - CLUSTER_NAME=local-docker
      - POD_NAMESPACE=local
      - POD_NAME=hello-agent-local
      - NODE_NAME=docker-desktop
    # Mount your local AWS creds for testing (Pod Identity handles this on EKS)
    volumes:
      - ~/.aws:/home/agent/.aws:ro
