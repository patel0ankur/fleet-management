# Project-level Backstage entities for smoke-team: the Group (the team that
# owns the project's services) and the System (the bounded context the
# services belong to). Service Components live in their OWN files under
# components/ (one per service) so a second service in the same project
# doesn't overwrite the first.
#
# A Group with no members renders an "owner not found"-style gap on entity
# pages; we include a guest User so ownership resolves cleanly in the demo.
# Real auth (GitHub OAuth / IdP) replaces this with actual user identities.
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: smoke-team
  description: Smoke test team (Phase 2 fixture)
  annotations:
    fleet.platform.{{ ORG }}/cost-center: "0000-smoke"
    fleet.platform.{{ ORG }}/namespace: smoke-team
spec:
  type: team
  children: []
  members:
    - guest
---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: smoke-team
  description: Smoke test workloads
spec:
  owner: group:default/smoke-team
