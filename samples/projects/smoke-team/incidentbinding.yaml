# Sample IncidentBinding (Phase 5). deploymentRef.name MUST equal the kro
# instance name so the Backstage FleetEntityProvider maps incidents to the
# right Component. Rendered only with --with-smoke.
apiVersion: platform.{{ ORG }}/v1alpha1
kind: IncidentBinding
metadata:
  name: hello
  namespace: smoke-team
spec:
  deploymentRef:
    name: hello
    namespace: smoke-team
  severity: HIGH
  alarms: []
