# Service account paired with the EKS Pod Identity association created by
# the CDK bootstrap stack (BackstagePodIdentity in 02-platform-stack.ts).
# Helm values (`backstage.serviceAccount.create: false`) point the Backstage
# pod at this SA so the Pod Identity webhook injects AWS_CONTAINER_* envs.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backstage
  namespace: backstage
  labels:
    fleet.platform.{{ ORG }}/component: backstage
