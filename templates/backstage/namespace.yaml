apiVersion: v1
kind: Namespace
metadata:
  name: backstage
  labels:
    fleet.platform.{{ ORG }}/component: backstage
    # The upstream backstage Helm chart's pod spec doesn't satisfy
    # pod-security 'restricted' out of the box (no runAsNonRoot, no
    # capabilities.drop=[ALL], no seccompProfile). Phase 3.5 will switch
    # to a custom image with explicit securityContext + a chart values
    # override; for now, leave PSA at the cluster default ('privileged' on
    # EKS) so the stock chart deploys cleanly.
    pod-security.kubernetes.io/enforce: privileged
