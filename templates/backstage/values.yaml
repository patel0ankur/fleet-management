# Backstage Helm values - stock upstream chart (backstage/backstage 2.6.0).
#
# Deferred to Phase 3.5 (custom image): kubernetes-ingestor, TechDocs builder,
# OpenChoreo-style catalog provider plugin reading Project/Deployment CRs.
# Anything that needs `app-config.yaml` plugin wiring lives there instead of
# here.

# Top-level: ServiceAccount creation is disabled; we created `backstage` SA
# in 20-serviceaccount.yaml so it pairs with the CDK Pod Identity association
# by name.
serviceAccount:
  create: false
  name: backstage

backstage:
  image:
    # Custom Fleet image (built from @backstage/create-app 1.51 via
    # backstage/Dockerfile.fleet). Unlike the upstream backstage/backstage
    # chart image, this registers the scaffolder GitHub module
    # (publish:github:pull-request) so PR-based scaffolding works. Phase 3.5.
    registry: "590443650088.dkr.ecr.us-east-1.amazonaws.com"
    repository: fleet/backstage
    tag: "1.51.2-fleet4"
  extraVolumes:
    - name: backstage-secrets
      csi:
        driver: secrets-store.csi.k8s.io
        readOnly: true
        volumeAttributes:
          secretProviderClass: backstage-secrets
  extraVolumeMounts:
    - name: backstage-secrets
      mountPath: /mnt/secrets
      readOnly: true
  extraEnvVarsSecrets:
    - backstage-secrets
  appConfig:
    app:
      title: Fleet Developer Portal
      baseUrl: https://{{ HOST }}
    organization:
      name: {{ ORG }}
    backend:
      baseUrl: https://{{ HOST }}
      listen:
        port: 7007
      cors:
        origin: https://{{ HOST }}
        methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
        credentials: true
      database:
        client: pg
        connection:
          host: backstage-postgresql
          port: 5432
          user: bn_backstage
          database: bn_backstage
          password: ${POSTGRES_PASSWORD}
    # GitHub integration. Now that the custom image registers
    # publish:github:pull-request, the scaffolder needs a real token to open
    # PRs against fleet-gitops. IMPORTANT: this token is sent on every GitHub
    # call, so it must be VALID (a placeholder turns catalog reads into 401s
    # that silently break ingestion). Set the real PAT in the
    # fleet/backstage/github-token secret before the scaffolder PR step works;
    # until then catalog reads of the public repo will 401. Scopes: repo +
    # pull_request (SSO-authorized if the org enforces SAML).
    integrations:
      github:
        - host: github.com
          token: ${GITHUB_TOKEN}
    # Auth: guest sign-in (demo-grade). AWS IdC custom applications are
    # built for trusted-token-issuer / identity propagation, not generic
    # OIDC web-login for a third-party app like Backstage - so reusing the
    # Argo IdC instance as a Backstage OIDC provider isn't a supported path
    # (the Argo capability gets IdC SSO because AWS built that integration
    # into the capability itself). For the workshop we use guest auth so the
    # catalog + scaffolder UX is usable. Phase 3.5 wires real auth via the
    # GitHub OAuth provider (same ecosystem as the catalog/scaffolder token)
    # or an external OIDC IdP. dangerouslyAllowOutsideDevelopment is required
    # because the backend runs with environment != development.
    auth:
      environment: production
      providers:
        guest:
          dangerouslyAllowOutsideDevelopment: true
    catalog:
      rules:
        - allow: [Group, User, System, Component, Template]
      locations:
        # NOTE: Fleet Group/System/Component entities are NO LONGER read from
        # hand-authored catalog-info.yaml files. The FleetEntityProvider
        # (plugins/catalog-backend-module-fleet) auto-discovers them from kro
        # StatelessServiceWithBucket instances in the cluster, with live
        # kro-state / bucket-arn / cost-center annotations. Only shared org
        # users and the scaffolder Template are file-based.
        - type: url
          target: https://github.com/{{ ORG_GH }}/fleet-gitops/blob/main/clusters/control/40-backstage/org/users.yaml
          rules:
            - allow: [User, Group]
        - type: url
          target: https://github.com/{{ ORG_GH }}/fleet-gitops/blob/main/clusters/control/40-backstage/scaffolder/*/template.yaml
          rules:
            - allow: [Template]
    scaffolder:
      defaultAuthor:
        name: Fleet Backstage
        email: backstage@{{ HOST }}
      defaultCommitMessage: 'feat: scaffolded by Backstage'
    # The stock Backstage app bundle validates that a techdocs block exists
    # even when we aren't building docs yet. 'local' generator + local
    # publisher satisfies the schema without external infra (S3/GCS). Full
    # TechDocs (out-of-process builder) is deferred to Phase 3.5.
    techdocs:
      builder: 'local'
      generator:
        runIn: 'local'
      publisher:
        type: 'local'
    # Kubernetes plugin wired to THIS cluster (in-cluster auth). The Backstage
    # pod talks to the local API server at kubernetes.default.svc using its own
    # `backstage` ServiceAccount token (read RBAC granted by 50-rbac.yaml).
    # Entity pages whose Component carries backstage.io/kubernetes-id show the
    # live objects labelled with that id (the kro RGD stamps the label onto the
    # Deployment + Service). customResources surfaces the kro/ACK objects too.
    kubernetes:
      serviceLocatorMethod:
        type: 'multiTenant'
      clusterLocatorMethods:
        - type: 'config'
          clusters:
            - name: fleet-control
              url: https://kubernetes.default.svc
              # authProvider serviceAccount + no explicit token => the plugin
              # reads the pod's own in-cluster SA token at
              # /var/run/secrets/kubernetes.io/serviceaccount/token and the
              # cluster CA from the same dir. No secret wiring needed.
              authProvider: serviceAccount
              skipTLSVerify: false
      customResources:
        - group: 'kro.run'
          apiVersion: 'v1alpha1'
          plural: 'statelessservicewithbuckets'
        - group: 's3.services.k8s.aws'
          apiVersion: 'v1alpha1'
          plural: 'buckets'
    # Phase 5: DevOps Agent plugin. The backend reads investigations from this
    # agentSpace at request time (AWS creds via the backstage Pod Identity
    # role). Empty agentSpaceId => the Incidents tab shows "not configured".
    # {{ DEVOPS_AGENT_SPACE_ID }} / {{ DEVOPS_AGENT_REGION }} are substituted
    # by render-gitops from spec.observability.devopsAgent.
    aws:
      devopsAgent:
        agentSpaceId: "{{ DEVOPS_AGENT_SPACE_ID }}"
        region: "{{ DEVOPS_AGENT_REGION }}"
ingress:
  enabled: true
  className: alb
  host: {{ HOST }}
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
postgresql:
  enabled: true
  # Bitnami relocated its free image catalog to the `bitnamilegacy` repo in
  # Aug 2025 and deleted the old tags from `docker.io/bitnami`. The Backstage
  # chart 2.6.0 postgresql subchart still defaults to the now-missing
  # `bitnami/postgresql:15.4.0-debian-11-r10`, so a fresh pod hits
  # ImagePullBackOff. Pin the same tag from bitnamilegacy (verified present).
  # allowInsecureImages lets the bitnami subchart accept a non-canonical
  # registry without its image-verification guard failing the render.
  # Phase 7 (RDS via ACK) removes the in-cluster database entirely.
  global:
    security:
      allowInsecureImages: true
  image:
    registry: docker.io
    repository: bitnamilegacy/postgresql
    tag: 15.4.0-debian-11-r10
  auth:
    username: bn_backstage
    database: bn_backstage
    # Explicit password (not chart-autogenerated). The bitnami subchart
    # generates a NEW random password on every helm render unless one is
    # pinned; under Argo that means each sync rewrites the Secret while the
    # already-initialized PVC keeps the original password -> permanent
    # 'password authentication failed'. A fixed value makes the rendered
    # Secret deterministic so it always matches what initdb wrote.
    # Dev-grade: the DB is cluster-internal (ClusterIP, no external exposure)
    # and Phase 7 replaces it with RDS + an ASCP-mounted credential.
    #
    # BOTH passwords must be pinned. The subchart writes two keys into the
    # backstage-postgresql Secret: `password` (the bn_backstage user) and
    # `postgres-password` (the postgres superuser). Pinning only the user
    # password leaves the admin one random, so every Argo sync re-renders a
    # different postgres-password -> the Secret shows permanent OutOfSync
    # drift. Pin both so the render is fully deterministic.
    password: fleet-backstage-local-dev
    postgresPassword: fleet-backstage-admin-dev
  primary:
    persistence:
      size: 8Gi
      # The cluster has no default StorageClass marked; gp2 is the only
      # provisioner present out of EKS bootstrap. Phase 7 (RDS migration)
      # makes this moot.
      storageClass: gp2
