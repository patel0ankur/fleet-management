# Fleet IncidentBinding — binds a workload (Deployment / kro instance) to the
# CloudWatch alarms that signal its incidents, and holds the live incident +
# RCA state. Namespace-scoped (lives in the Project's namespace, alongside the
# Deployment it covers).
#
# Flow: a CloudWatch alarm (or fleet.argo event) fires -> EventBridge -> the
# incident-enricher Lambda finds the IncidentBinding whose spec.alarms[].arn
# matches, calls the AWS DevOps Agent (CreateBacklogTask, taskType
# INVESTIGATION), and patches .status.activeIncidents with the returned
# taskId/executionId. A poller then updates executionStatus / rcaUrl from
# ListExecutions. The Backstage FleetEntityProvider reads .status to surface
# incidents on the workload's Component page.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: incidentbindings.platform.{{ ORG }}
spec:
  group: platform.{{ ORG }}
  scope: Namespaced
  names:
    kind: IncidentBinding
    listKind: IncidentBindingList
    singular: incidentbinding
    plural: incidentbindings
    shortNames: [ib]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [deploymentRef]
              properties:
                deploymentRef:
                  type: object
                  description: |
                    The workload this binding covers. `name` MUST equal the kro
                    instance name (the Backstage FleetEntityProvider keys
                    Components off the kro instance name), so incidents map to
                    the right Component.
                  required: [name]
                  properties:
                    name: { type: string }
                    namespace: { type: string }
                severity:
                  type: string
                  description: Default DevOps Agent investigation priority for this workload.
                  enum: [CRITICAL, HIGH, MEDIUM, LOW, MINIMAL]
                  default: HIGH
                alarms:
                  type: array
                  description: CloudWatch alarm ARNs whose ALARM state opens an incident.
                  items:
                    type: object
                    required: [arn]
                    properties:
                      arn: { type: string }
                      severity:
                        type: string
                        enum: [CRITICAL, HIGH, MEDIUM, LOW, MINIMAL]
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
              properties:
                activeIncidents:
                  type: array
                  items:
                    type: object
                    required: [incidentId]
                    properties:
                      incidentId: { type: string }
                      title: { type: string }
                      severity:
                        type: string
                        enum: [CRITICAL, HIGH, MEDIUM, LOW, MINIMAL]
                      alarmArn: { type: string }
                      openedAt: { type: string, format: date-time }
                      # DevOps Agent investigation linkage (CreateBacklogTask).
                      taskId: { type: string }
                      executionId: { type: string }
                      executionStatus: { type: string }
                      rcaUrl: { type: string }
                      # Set when the enricher could not reach the agent
                      # (e.g. agentSpaceId unset) but still recorded the incident.
                      agentSkipped: { type: boolean }
                conditions:
                  type: array
                  items:
                    type: object
                    required: [type, status]
                    properties:
                      type: { type: string }
                      status: { type: string, enum: ["True", "False", "Unknown"] }
                      reason: { type: string }
                      message: { type: string }
                      lastTransitionTime: { type: string, format: date-time }
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Workload
          type: string
          jsonPath: .spec.deploymentRef.name
        - name: Open
          type: integer
          jsonPath: .status.activeIncidents.length
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
