name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ts:
    name: TypeScript / CDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      # Synth against the CI fixture (config/platform.ci.yaml): it has
      # valid-shaped values (the example's placeholders are intentionally
      # rejected by the loader's postValidate guard) and uses the real
      # account/region so the committed cdk.context.json AZ data lets
      # --no-lookups synth without AWS credentials.
      - name: cdk synth (CI fixture)
        run: npx cdk synth --context configFile=config/platform.ci.yaml --no-lookups
      - run: npx jest --passWithNoTests

  shell:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y shellcheck
      - run: shellcheck hack/check-tools.sh
